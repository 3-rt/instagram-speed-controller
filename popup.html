<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 14px;
    }
    .toggle-btn {
      padding: 6px 18px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .toggle-btn:first-child {
      border-radius: 6px 0 0 6px;
      border-right: none;
    }
    .toggle-btn:last-child {
      border-radius: 0 6px 6px 0;
    }
    .toggle-btn.active-on {
      background: #0095f6;
      color: #fff;
      border-color: #0095f6;
    }
    .toggle-btn.active-off {
      background: #444;
      color: #fff;
      border-color: #444;
    }
    .settings-link {
      display: block;
      text-align: center;
      color: #0095f6;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .settings-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Speed Controller</h1>
  <div class="toggle-row">
    <button class="toggle-btn" id="btnOn">On</button>
    <button class="toggle-btn" id="btnOff">Off</button>
  </div>
  <a class="settings-link" id="openSettings">Settings</a>
  <script src="popup.js"></script>
</body>
</html>
